services:
  - type: web
    name: carritowebpst-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npx tsx prisma/seed.ts && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carritowebpst-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://esteeg81.github.io

databases:
  - name: carritowebpst-db
    plan: free
    databaseName: carritowebpst
    user: carritowebpst
